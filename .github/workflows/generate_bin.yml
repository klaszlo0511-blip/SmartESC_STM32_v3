name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Frissítve v2 -> v4
      with:
        submodules: recursive

    - name: Set up arm-none-eabi-gcc
      uses: fiam/arm-none-eabi-gcc@v1.0.2
      with:
        release: '9-2020-q2'

    - name: Build project
      run: make
      
    - name: Set up Python
      uses: actions/setup-python@v5  # Frissítve v2 -> v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Prepare ZIP
      run: python tools/xiaotea/Scripts/prepareZip_online.py      
      
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v4  # Ez volt a kritikus hiba (v2 -> v4)
      with:
        path: ${{ github.workspace }}/tools/zip_output
        name: M365_v3_build_${{ github.run_number }}
        retention-days: 5
